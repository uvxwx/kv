[tool.ruff]
line-length = 100
target-version = "py313"
[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
    # pep8-naming
    "N",
]

[tool.ty.src]
include = ["check_unicode_hygiene.py"]

[tool.ty.terminal]
output-format = "concise"
